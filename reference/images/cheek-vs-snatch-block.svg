<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Side-loading snatch block vs deck-mounted cheek block fairlead</title>
  <desc id="desc">Textbook-style technical illustration comparing a side-loading snatch block and a deck-mounted cheek block fairlead with mechanically correct rope paths.</desc>
  <defs>
    <style>
      .outline { stroke: #1a1a1a; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #6e6e6e; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .divider { stroke: #d8d8d8; stroke-width: 2; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; letter-spacing: 0.08em; fill: #111111; }
      .subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 27px; font-weight: 600; fill: #333333; }
      .caption { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #4a4a4a; }
      .boxtext { font-family: Arial, Helvetica, sans-serif; font-size: 16px; fill: #4a4a4a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111111; }
    </style>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef2f5"/>
      <stop offset="100%" stop-color="#bcc5cc"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d7dde2"/>
      <stop offset="100%" stop-color="#8b959d"/>
    </linearGradient>
    <linearGradient id="rope" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9c59d"/>
      <stop offset="100%" stop-color="#bc9762"/>
    </linearGradient>
    <linearGradient id="deck" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b389"/>
      <stop offset="100%" stop-color="#c19363"/>
    </linearGradient>
    <filter id="ropeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="3" flood-color="#6f6f6f" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e6e6e"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1000" fill="#ffffff"/>
  <text x="900" y="74" text-anchor="middle" class="subtitle">Side-loading snatch block vs deck-mounted cheek block fairlead</text>
  <line x1="900" y1="120" x2="900" y2="940" class="divider"/>

  <g id="left-panel">
    <text x="450" y="146" text-anchor="middle" class="title">SNATCH BLOCK</text>
    <text x="450" y="180" text-anchor="middle" class="caption">Open cheek shown partly open. Rope is aligned with the groove before insertion.</text>

    <circle cx="450" cy="252" r="38" fill="url(#metal)" class="outline"/>
    <rect x="432" y="246" width="36" height="82" rx="16" fill="#edf1f4" class="outline"/>
    <rect x="440" y="318" width="20" height="32" rx="6" fill="url(#metalDark)" class="outline"/>

    <path d="M 398 292
             C 382 329 378 371 378 418
             L 378 602
             C 378 660 409 710 450 736
             C 491 710 522 660 522 602
             L 522 418
             C 522 371 518 329 502 292
             C 490 264 472 242 450 228
             C 428 242 410 264 398 292 z"
          fill="url(#metal)" class="outline"/>

    <circle cx="450" cy="470" r="80" fill="#e1e6ea" class="outline"/>
    <circle cx="450" cy="470" r="64" fill="url(#metalDark)" class="outline"/>
    <circle cx="450" cy="470" r="18" fill="#ffffff" class="outline"/>
    <circle cx="450" cy="470" r="56" fill="none" stroke="#8f98a0" stroke-width="9"/>
    <circle cx="450" cy="470" r="8" fill="#ffffff" class="outline"/>

    <g transform="rotate(28 450 470)" opacity="0.96">
      <path d="M 476 326
               C 523 326 560 364 560 411
               L 560 660
               C 560 690 536 715 506 720
               L 486 724
               C 471 726 458 714 460 699
               L 477 559
               C 480 529 480 499 477 469
               L 460 351
               C 458 337 468 326 476 326 z"
            fill="#edf1f4" class="outline"/>
      <rect x="490" y="700" width="54" height="24" rx="3" fill="url(#metalDark)" class="outline"/>
      <rect x="504" y="720" width="26" height="44" rx="4" fill="#edf1f4" class="outline"/>
      <circle cx="517" cy="741" r="7" fill="#ffffff" class="outline"/>
    </g>

    <path d="M 530 470 L 614 470" fill="none" stroke="#bc9762" stroke-width="18" stroke-linecap="round"/>
    <path d="M 530 470 L 614 470" fill="none" stroke="url(#rope)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 624 418 C 600 432 583 448 574 465" class="thin" marker-end="url(#arrow)"/>

    <line x1="396" y1="336" x2="240" y2="288" class="thin"/>
    <text x="84" y="286" class="label">swivel hook</text>

    <line x1="386" y1="542" x2="212" y2="566" class="thin"/>
    <text x="52" y="574" class="label">fixed cheek (block body)</text>

    <line x1="406" y1="526" x2="246" y2="682" class="thin"/>
    <text x="82" y="690" class="label">sheave</text>

    <line x1="528" y1="412" x2="646" y2="298" class="thin"/>
    <text x="656" y="296" class="label">swinging cheek pivots on sheave axle</text>

    <line x1="450" y1="470" x2="646" y2="386" class="thin"/>
    <text x="656" y="392" class="label">shared central axle bolt</text>

    <line x1="542" y1="716" x2="646" y2="640" class="thin"/>
    <text x="656" y="646" class="label">locking latch / captive pin</text>

    <line x1="576" y1="470" x2="646" y2="520" class="thin"/>
    <text x="656" y="526" class="label">rope about to drop into sheave groove</text>

    <rect x="68" y="816" width="762" height="88" rx="8" fill="#f7f7f7" stroke="#d7d7d7" stroke-width="1.6"/>
    <text x="92" y="848" class="boxtext">The swinging cheek opens sideways so a loaded line can be dropped directly into the groove.</text>
    <text x="92" y="874" class="boxtext">Closing the cheek and securing the latch traps the rope on the sheave like a normal block.</text>
  </g>

  <g id="right-panel">
    <text x="1350" y="146" text-anchor="middle" class="title">CHEEK BLOCK (deck-mounted fairlead)</text>
    <text x="1350" y="180" text-anchor="middle" class="caption">Low-profile turning fairlead. The line wraps 90 degrees and stays pressed against the deck.</text>

    <polygon points="1025,645 1568,645 1640,828 1097,828" fill="url(#deck)" class="outline"/>
    <line x1="1055" y1="676" x2="1598" y2="676" stroke="#9f7449" stroke-width="2"/>
    <line x1="1085" y1="707" x2="1620" y2="707" stroke="#9f7449" stroke-width="2"/>
    <line x1="1115" y1="738" x2="1632" y2="738" stroke="#9f7449" stroke-width="2"/>
    <line x1="1145" y1="769" x2="1638" y2="769" stroke="#9f7449" stroke-width="2"/>
    <line x1="1175" y1="800" x2="1640" y2="800" stroke="#9f7449" stroke-width="2"/>

    <path d="M 1232 414 A 112 112 0 1 0 1510 518" fill="none" stroke="#d9dee3" stroke-width="34" stroke-linecap="round"/>
    <path d="M 1232 414 A 112 112 0 1 0 1510 518" fill="none" stroke="#1a1a1a" stroke-width="2.4" stroke-linecap="round"/>

    <circle cx="1330" cy="518" r="102" fill="#e1e6ea" class="outline"/>
    <circle cx="1330" cy="518" r="82" fill="url(#metalDark)" class="outline"/>
    <circle cx="1330" cy="518" r="18" fill="#ffffff" class="outline"/>
    <circle cx="1330" cy="518" r="74" fill="none" stroke="#98a2aa" stroke-width="10"/>
    <circle cx="1330" cy="518" r="7" fill="#ffffff" class="outline"/>

    <circle cx="1204" cy="770" r="12" fill="#ffffff" class="outline"/>
    <circle cx="1456" cy="770" r="12" fill="#ffffff" class="outline"/>

    <path d="M 1040 416 L 1330 416" fill="none" stroke="#8a8a8a" stroke-width="20" stroke-linecap="round" opacity="0.18" filter="url(#ropeShadow)"/>
    <path d="M 1330 416 A 102 102 0 0 1 1432 518" fill="none" stroke="#8a8a8a" stroke-width="20" stroke-linecap="round" opacity="0.18" filter="url(#ropeShadow)"/>
    <path d="M 1432 518 L 1432 845" fill="none" stroke="#8a8a8a" stroke-width="20" stroke-linecap="round" opacity="0.18" filter="url(#ropeShadow)"/>

    <path d="M 1040 416 L 1330 416" fill="none" stroke="#bc9762" stroke-width="18" stroke-linecap="round"/>
    <path d="M 1330 416 A 102 102 0 0 1 1432 518" fill="none" stroke="#bc9762" stroke-width="18" stroke-linecap="round"/>
    <path d="M 1432 518 L 1432 845" fill="none" stroke="#bc9762" stroke-width="18" stroke-linecap="round"/>

    <path d="M 1040 416 L 1330 416" fill="none" stroke="url(#rope)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 1330 416 A 102 102 0 0 1 1432 518" fill="none" stroke="url(#rope)" stroke-width="14" stroke-linecap="round"/>
    <path d="M 1432 518 L 1432 845" fill="none" stroke="url(#rope)" stroke-width="14" stroke-linecap="round"/>

    <line x1="1244" y1="450" x2="1086" y2="304" class="thin"/>
    <text x="968" y="300" class="label">exposed cheek plate</text>

    <line x1="1124" y1="416" x2="1062" y2="506" class="thin"/>
    <text x="952" y="512" class="label">incoming line</text>

    <line x1="1276" y1="564" x2="1086" y2="706" class="thin"/>
    <text x="928" y="714" class="label">rope rides in sheave groove</text>

    <line x1="1230" y1="614" x2="1086" y2="764" class="thin"/>
    <text x="960" y="772" class="label">deck acts as second cheek</text>

    <line x1="1372" y1="470" x2="1574" y2="306" class="thin"/>
    <text x="1204" y="300" class="label">sheave rotates on stainless axle bolt</text>

    <line x1="1330" y1="518" x2="1520" y2="486" class="thin"/>
    <text x="1530" y="492" class="label">sheave axle bolt</text>

    <line x1="1432" y1="674" x2="1568" y2="720" class="thin"/>
    <text x="1380" y="728" class="label">outgoing line (redirected ~90°)</text>

    <line x1="1456" y1="770" x2="1568" y2="780" class="thin"/>
    <text x="1360" y="788" class="label">through-bolted to deck</text>

    <rect x="952" y="836" width="778" height="96" rx="8" fill="#f7f7f7" stroke="#d7d7d7" stroke-width="1.6"/>
    <text x="976" y="868" class="boxtext">The deck itself becomes the second cheek, so the rope stays down on the sheave.</text>
    <text x="976" y="894" class="boxtext">The fairlead redirects the sheet across the deck with a true 90 degree tangent wrap.</text>
    <text x="976" y="920" class="boxtext">The line behaves like a belt running around a pulley, with no lift away from the groove.</text>
  </g>
</svg>